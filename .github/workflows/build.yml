name: Build Android APK

on:
  push:
      branches: [ main ]
        workflow_dispatch:

        jobs:
          build:
              runs-on: ubuntu-latest

                      steps:
                          - name: Checkout code
                                uses: actions/checkout@v4

                                        - name: Set up Python
                                              uses: actions/setup-python@v5
                                                    with:
                                                            python-version: '3.11'

                                                                    - name: Install dependencies
                                                                          run: |
                                                                                  pip install buildozer cython==0.29.36
                                                                                          sudo apt-get update
                                                                                                  sudo apt-get install -y libncurses5 libffi-dev libssl-dev
                                                                                                      
                                                                                                          - name: Set up Java 17
                                                                                                                uses: actions/setup-java@v4
                                                                                                                      with:
                                                                                                                              java-version: '17'
                                                                                                                                      distribution: 'temurin'
                                                                                                                                          
                                                                                                                                              - name: Build APK
                                                                                                                                                    run: |
                                                                                                                                                            buildozer android debug
                                                                                                                                                                
                                                                                                                                                                    - name: Upload APK
                                                                                                                                                                          uses: actions/upload-artifact@v4
                                                                                                                                                                                with:
                                                                                                                                                                                        name: lv-trlator-apk
                                                                                                                                                                                                path: .buildozer/android/platform/build/app/build/outputs/apk/debug/*.apk
